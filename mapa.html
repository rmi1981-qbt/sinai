<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Células no Mapa - Rede Azul</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS (Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=10">
    <link rel="stylesheet" href="mapa.css?v=10">
</head>

<body>
    <!-- Navegação -->
    <nav class="navbar glass">
        <div class="logo">
            <a href="index.html">
                <img src="assets/images/logo_atitude.png" alt="Igreja Atitude" class="nav-logo-img">
            </a>
        </div>
        <a href="index.html" class="btn-visit" style="color: white;">Voltar ao Início</a>
    </nav>

    <div class="map-layout">
        <!-- Barra Lateral com Filtros -->
        <aside class="sidebar glass">
            <h2>Filtre e Encontre</h2>

            <!-- Pesquisa por Endereço Geospacial -->
            <div class="filter-group" style="margin-bottom: 10px;">
                <label for="address-search">Célula mais próxima (Endereço)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="address-search" placeholder="Rua Nome, Cidade" style="flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #cccccc; background: #fff; color: #333; font-family: 'Outfit', sans-serif;">
                    <button id="btn-search-address" style="background: var(--primary-gold); border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; color: white; font-weight: bold;">Ir</button>
                </div>
            </div>

            <div class="filter-group">
                <label for="filter-rede">Rede</label>
                <select id="filter-rede">
                    <option value="">Todas</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="filter-cidade">Cidade</label>
                <select id="filter-cidade">
                    <option value="">Todas</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filter-bairro">Bairro</label>
                <select id="filter-bairro">
                    <option value="">Todos</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="filter-group" style="flex: 1;">
                    <label for="filter-horario">Horário</label>
                    <select id="filter-horario">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 1;">
                    <label for="filter-kids">Kids</label>
                    <select id="filter-kids">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>

            <!-- Quadro de Resumo por Dia -->
            <div class="summary-box">
                <h3>Células por Dia</h3>
                <ul id="summary-list">
                    <!-- Gerado pelo Javascript -->
                </ul>
            </div>

            <!-- QR Code de Cadastro -->
            <div class="qr-container" style="text-align: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eeeeee; display: flex; flex-direction: column; justify-content: flex-end;">
                <h3 style="color: var(--primary-gold); font-size: 1.1rem; margin-bottom: 10px; font-weight: 800;">Bem-vindos à família Atitude!</h3>
                <img src="assets/images/qr_cadastro.png" alt="QR Code Cadastro" style="width: 100%; max-width: 200px; height: auto; background: white; padding: 5px; border-radius: 8px; border: 2px solid var(--primary-gold); margin: 0 auto;">
            </div>

            <!-- Botão para Vídeos removido conforme solicitado -->
        </aside>

        <!-- Container do Mapa -->
        <main class="map-container-main">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS (Mapa) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Script Personalizado -->
    <script src="mapa.js?v=10"></script>
</body>

</html>
